services:
  claude-docker-webui:
    build: .
    container_name: claude-docker-webui
    ports:
      - "7681:7681"
    volumes:
      - /mnt/user/obsmedia:/project
      - /mnt/user/appdata/claude-docker/auth:/home/claude/.claude
      - /mnt/user/appdata/claude-docker/bin:/home/claude/.local
    environment:
      - CLAUDE_USER=claude
      - CLAUDE_PASSWORD=claude
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7681/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
