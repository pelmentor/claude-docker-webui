<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Claude Code</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg">
    <link rel="apple-touch-icon" href="/icon-192.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <span class="header-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                    <polyline points="4 17 10 11 4 5"></polyline>
                    <line x1="12" y1="19" x2="20" y2="19"></line>
                </svg>
            </span>
            <span class="header-title">Claude Code</span>
            <span class="header-version" id="header-version"></span>
            <span class="header-project" id="header-project"></span>
        </div>
        <div class="header-right">
            <button class="header-btn" id="btn-restart" title="Restart Claude">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                <span class="btn-text">Restart</span>
            </button>
            <button class="header-btn" id="btn-update" title="Update Claude">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
                <span class="btn-text">Update</span>
            </button>
            <button class="header-btn" id="btn-new-session" title="New Session">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span class="btn-text">New</span>
            </button>
            <button class="header-btn header-btn-menu" id="btn-menu" title="Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </header>

    <!-- Mobile menu overlay -->
    <div class="menu-overlay hidden" id="menu-overlay">
        <div class="menu-sheet" id="menu-sheet">
            <button class="menu-item" id="menu-restart">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                Restart Claude
            </button>
            <button class="menu-item" id="menu-update">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
                Update Claude
            </button>
            <button class="menu-item" id="menu-new-session">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Session
            </button>
            <div class="menu-divider"></div>
            <div class="menu-info">
                <div>Version: <span id="menu-version">-</span></div>
                <div>Project: <span id="menu-project">-</span></div>
                <div>Uptime: <span id="menu-uptime">-</span></div>
            </div>
            <div class="menu-divider"></div>
            <button class="menu-item menu-item-danger" onclick="location.href='/logout'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </button>
        </div>
    </div>

    <!-- Terminal -->
    <div id="terminal-container">
        <!-- Skeleton loader -->
        <div class="skeleton" id="skeleton">
            <div class="skeleton-line" style="width:60%"></div>
            <div class="skeleton-line" style="width:80%"></div>
            <div class="skeleton-line" style="width:45%"></div>
            <div class="skeleton-line" style="width:70%"></div>
        </div>
        <div id="terminal"></div>
    </div>

    <!-- Extra keys (mobile) -->
    <div class="extra-keys" id="extra-keys">
        <button data-key="&#9;">Tab</button>
        <button data-key="ctrl" class="modifier">Ctrl</button>
        <button data-key="&#27;">Esc</button>
        <button data-key="&#27;[A" class="arrow">&#8593;</button>
        <button data-key="&#27;[B" class="arrow">&#8595;</button>
        <button data-key="&#27;[D" class="arrow">&#8592;</button>
        <button data-key="&#27;[C" class="arrow">&#8594;</button>
        <button data-key="|">|</button>
        <button data-key="/">/</button>
        <button data-key="~">~</button>
    </div>

    <!-- Font size controls -->
    <div class="font-controls" id="font-controls">
        <button id="font-decrease" title="Decrease font">A-</button>
        <span id="font-size-display">14</span>
        <button id="font-increase" title="Increase font">A+</button>
    </div>

    <!-- Status bar -->
    <footer id="status-bar">
        <div class="status-left">
            <span class="status-dot" id="status-dot">
                <span class="status-dot-ping"></span>
                <span class="status-dot-core"></span>
            </span>
            <span class="status-text" id="status-text">Connecting...</span>
        </div>
        <div class="status-right">
            <span id="session-timer">0:00:00</span>
        </div>
    </footer>

    <!-- Reconnect overlay -->
    <div class="overlay hidden" id="reconnect-overlay">
        <div class="overlay-content">
            <div class="overlay-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48">
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
                    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                    <line x1="12" y1="20" x2="12.01" y2="20"></line>
                </svg>
            </div>
            <h2>Connection Lost</h2>
            <p id="reconnect-message">Reconnecting...</p>
            <button class="btn-reconnect hidden" id="btn-reconnect">Reconnect</button>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/terminal.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/mobile.js"></script>
</body>
</html>
